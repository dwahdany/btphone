<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#182240"/>
      <stop offset="1" stop-color="#05070d"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="helm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4f7fb"/>
      <stop offset="1" stop-color="#c2cede"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#34d399" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <mask id="helmL">
      <rect width="1024" height="1024" fill="black"/>
      <circle cx="250" cy="500" r="130" fill="white"/>
      <rect x="120" y="500" width="260" height="115" rx="34" fill="white"/>
      <rect x="272" y="438" width="160" height="96" rx="44" fill="black"/>
    </mask>
    <mask id="helmR">
      <rect width="1024" height="1024" fill="black"/>
      <circle cx="774" cy="500" r="130" fill="white"/>
      <rect x="644" y="500" width="260" height="115" rx="34" fill="white"/>
      <rect x="592" y="438" width="160" height="96" rx="44" fill="black"/>
    </mask>
  </defs>

  <rect width="1024" height="1024" fill="url(#bg)"/>
  <circle cx="512" cy="500" r="300" fill="url(#glow)"/>

  <g mask="url(#helmL)">
    <rect width="1024" height="1024" fill="url(#helm)"/>
  </g>
  <g mask="url(#helmR)">
    <rect width="1024" height="1024" fill="url(#helm)"/>
  </g>

  <!-- waveform between the two riders -->
  <g fill="url(#wave)">
    <rect x="422" y="450" width="20" height="70"  rx="10"/>
    <rect x="462" y="420" width="20" height="130" rx="10"/>
    <rect x="502" y="380" width="20" height="210" rx="10"/>
    <rect x="542" y="420" width="20" height="130" rx="10"/>
    <rect x="582" y="450" width="20" height="70"  rx="10"/>
  </g>
</svg>

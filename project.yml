name: BTPhone
options:
  bundleIdPrefix: com.wahdany
  deploymentTarget:
    iOS: "26.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
fileGroups:
  - Configuration.storekit
schemes:
  BTPhone:
    build:
      targets:
        BTPhone: all
    run:
      config: Debug
      storeKitConfiguration: Configuration.storekit
    archive:
      config: Release
targets:
  BTPhone:
    type: application
    platform: iOS
    sources:
      - BTPhone
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wahdany.twoup
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 8HAR42CEXZ
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0"
    entitlements:
      path: BTPhone/BTPhone.entitlements
      properties:
        com.apple.developer.wifi-aware:
          - Publish
          - Subscribe
    info:
      path: BTPhone/Info.plist
      properties:
        CFBundleDisplayName: TwoUp
        UILaunchScreen: {}
        NSMicrophoneUsageDescription: "TwoUp streams your voice to the other rider's phone."
        WiFiAwareServices:
          _twoup._udp:
            Publishable: {}
            Subscribable: {}
        UIBackgroundModes:
          - audio
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false

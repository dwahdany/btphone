name: BTPhone
options:
  bundleIdPrefix: com.wahdany
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
targets:
  BTPhone:
    type: application
    platform: iOS
    sources:
      - BTPhone
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wahdany.btphone
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 8HAR42CEXZ
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0"
    info:
      path: BTPhone/Info.plist
      properties:
        CFBundleDisplayName: BTPhone
        UILaunchScreen: {}
        NSMicrophoneUsageDescription: "BTPhone streams your voice to the other rider's phone."
        NSLocalNetworkUsageDescription: "BTPhone connects directly to the other phone over peer-to-peer Wi-Fi. No data leaves the two phones."
        NSBonjourServices:
          - _btphone._udp
        UIBackgroundModes:
          - audio
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: true
        ITSAppUsesNonExemptEncryption: false
